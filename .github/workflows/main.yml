name: Run AFK Bot
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  afk-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mineflayer
        run: npm install mineflayer

      - name: Run Bot
        run: |
          node -e "
          const mineflayer = require('mineflayer');
          const bot = mineflayer.createBot({
            host: 'VengefulBattle.play.hosting',
            username: 'Devil_Bot',
            version: '1.21.1',
            hideErrors: true
          });

          // This disables the chat system so DiscordSRV can't crash the bot
          bot.plugins.chat = () => {}; 

          bot.on('spawn', () => {
            console.log('Devil_Bot is in and officially deaf to chat!');
            bot.physicsEnabled = false;
          });

          bot.on('error', (err) => {
            if (err.message.includes('chat')) return;
            console.log('Error:', err);
          });
          
          bot.on('kicked', (reason) => console.log('Kicked:', reason));

          setTimeout(() => { process.exit(0); }, 840000);
          "

          bot.on('kicked', (reason) => console.log('Kicked:', reason));
          bot.on('error', (err) => {
            if (err.message.includes('chat')) return; // Ignore chat errors
            console.log('Error:', err);
          });

          setTimeout(() => { process.exit(0); }, 840000);
          "
          setTimeout(() => { process.exit(0); }, 840000);
          "
          });

          bot.on('error', (err) => console.log('Error:', err));
          bot.on('kicked', (reason) => console.log('Kicked:', reason));
          
          setTimeout(() => { process.exit(0); }, 840000);
          "
          bot.on('error', (err) => console.log('Error:', err));
          bot.on('kicked', (reason) => console.log('Kicked for:', reason));
          
          // Keep alive for 14 minutes
          setTimeout(() => { process.exit(0); }, 840000);
          "
