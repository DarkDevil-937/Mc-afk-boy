name: Run AFK Bot
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  afk-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mineflayer
        run: npm install mineflayer

      - name: Run Bot
        run: |
          node -e "
          const mineflayer = require('mineflayer');
          const bot = mineflayer.createBot({
            host: 'VengefulBattle.play.hosting',
            username: 'Devil_Bot',
            version: '1.21.1'
          });

          bot.once('spawn', () => {
            console.log('Devil_Bot is in the world!');
            // Wait 2 seconds for world to load, then look down to confirm position
            setTimeout(() => {
              bot.look(0, -1);
            }, 2000);
          });

          bot.on('error', (err) => console.log('Error:', err));
          bot.on('kicked', (reason) => console.log('Kicked for:', reason));
          
          // Keep alive for 14 minutes
          setTimeout(() => { process.exit(0); }, 840000);
          "
